---
repos:
  # ------------------------------------------------------------
  # Local workflow + governance hooks
  # ------------------------------------------------------------
  - repo: local
    hooks:
      # Auto-stage config changes
      - id: auto-stage-precommit-config
        name: auto stage pre-commit config
        entry: bash -c 'git add .pre-commit-config.yaml'
        language: system
        pass_filenames: false
        always_run: true
        files: ^\.pre-commit-config\.yaml$

      # Docs formatting
      - id: fix-markdown-headings
        name: fix markdown headings
        entry: python3 scripts/fix_markdown_headings.py
        language: system
        files: ^website/docs/.*\.md$

      # Repo governance
      - id: check-no-legacy-docs
        name: prevent legacy docs drift
        entry: python3 scripts/check_no_mkdocs.py
        language: system
        pass_filenames: false

      - id: validate-blog-tags
        name: validate blog tags
        entry: python scripts/validate_blog_tags.py
        language: python
        additional_dependencies:
          - pyyaml
        pass_filenames: false

      - id: docs-check
        name: docs consistency checks
        entry: bash scripts/docs_check.sh
        language: system
        pass_filenames: false

      # Frontend + docs tooling
      - id: cspell
        name: spell check docs
        entry: npx cspell --config cspell.config.yaml
        language: system
        files: \.(md|mdx)$

      - id: eslint
        name: eslint
        entry: npx eslint --fix
        language: system
        files: ^website/src/.*\.(js|mjs|cjs|jsx)$

      - id: stylelint
        name: stylelint
        entry: npx stylelint --fix
        language: system
        files: ^website/src/.*\.(css|scss)$

      - id: prettier
        name: prettier
        entry: npx prettier --write
        language: system
        types_or: [javascript, css, json, markdown, yaml]

  # ------------------------------------------------------------
  # Markdown linting
  # ------------------------------------------------------------
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint
        args: ["--fix"]

  # ------------------------------------------------------------
  # Basic hygiene
  # ------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-merge-conflict

  # ------------------------------------------------------------
  # YAML linting
  # ------------------------------------------------------------
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        files: \.(yml|yaml)$

  # ------------------------------------------------------------
  # Python linting + formatting
  # ------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.7
    hooks:
      - id: ruff
        args: ["--fix"]
        files: \.py$
      - id: ruff-format
        files: \.py$
