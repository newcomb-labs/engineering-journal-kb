---
repos:
  # ------------------------------------------------------------
  # Local workflow + governance hooks
  # ------------------------------------------------------------
  - repo: local
    hooks:
      # Auto-stage common config/package files changed by hooks
      - id: auto-stage-managed-files
        name: auto stage managed config files
        entry: bash -c 'git add .pre-commit-config.yaml package.json package-lock.json website/package.json website/package-lock.json 2>/dev/null || true'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      # Fast local docs formatting
      - id: fix-markdown-headings
        name: fix markdown headings
        entry: python3 scripts/fix_markdown_headings.py
        language: system
        files: ^website/docs/.*\.md$
        stages: [pre-commit]

      # Fast local governance guard
      - id: check-no-legacy-docs
        name: prevent legacy docs drift
        entry: python3 scripts/check_no_mkdocs.py
        language: system
        pass_filenames: false
        stages: [pre-commit, manual]

      # Slow hooks: run manually when needed
      - id: validate-blog-tags
        name: validate blog tags
        entry: python scripts/validate_blog_tags.py
        language: python
        additional_dependencies:
          - pyyaml
        pass_filenames: false
        stages: [manual]

      - id: docs-check
        name: docs consistency checks
        entry: bash scripts/docs_check.sh
        language: system
        pass_filenames: false
        stages: [manual]

      # Frontend + docs tooling
      - id: cspell
        name: spell check docs
        entry: npx cspell --config cspell.config.yaml
        language: system
        files: \.(md|mdx)$
        stages: [pre-commit]

      - id: eslint
        name: eslint
        entry: npx eslint --fix
        language: system
        files: ^website/src/.*\.(js|mjs|cjs|jsx)$
        stages: [pre-commit]

      - id: stylelint
        name: stylelint
        entry: npx stylelint --fix
        language: system
        files: ^website/src/.*\.(css|scss)$
        stages: [pre-commit]

      - id: prettier
        name: prettier
        entry: npx prettier --write
        language: system
        files: \.(js|mjs|cjs|jsx|css|scss|json|md|ya?ml)$
        exclude: ^\.yamllint$
        stages: [pre-commit]

      - id: validate-content
        name: validate content governance
        entry: python3 scripts/validate_content.py
        language: system
        files: ^website/docs/.*\.md$
  # ------------------------------------------------------------
  # Markdown linting
  # ------------------------------------------------------------
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint
        args: ["--fix"]
        stages: [pre-commit]

  # ------------------------------------------------------------
  # Basic hygiene
  # ------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: end-of-file-fixer
        stages: [pre-commit]
      - id: check-yaml
        stages: [pre-commit]
      - id: check-added-large-files
        args: ["--maxkb=1024"]
        stages: [pre-commit]
      - id: check-merge-conflict
        stages: [pre-commit]

  # ------------------------------------------------------------
  # YAML linting
  # ------------------------------------------------------------
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        files: \.(yml|yaml)$
        stages: [pre-commit]

  # ------------------------------------------------------------
  # Python linting + formatting
  # ------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.7
    hooks:
      - id: ruff
        args: ["--fix"]
        files: \.py$
        stages: [pre-commit]
      - id: ruff-format
        files: \.py$
        stages: [pre-commit]
