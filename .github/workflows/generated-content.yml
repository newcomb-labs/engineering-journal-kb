---
version: 2

generated_outputs:
  docs_root: website/docs/_generated
  files:
    - website/docs/_generated/_category_.json
    - website/docs/_generated/content-manifest.json
    - website/docs/_generated/glossary.md
    - website/docs/_generated/indexes/_category_.json
    - website/docs/_generated/indexes/labs.md
    - website/docs/_generated/indexes/journal.md
    - website/docs/_generated/indexes/case-studies.md
    - website/docs/_generated/indexes/governance.md
    - website/docs/labs/_category_.json
    - website/docs/case-studies/_category_.json
    - website/docs/governance/_category_.json
    - website/docs/engineering/_category_.json
    - website/docs/operations/_category_.json

  paths:
    - "website/docs/**"
    - ".github/governance/**"
    - "scripts/generate_content_artifacts.py"
    - "scripts/validate_generated_content.py"
    - ".github/workflows/generated-content.yml"
    - ".github/workflows/docs-ci.yml"
    - "website/sidebars.js"
    - ".pre-commit-config.yaml"

generated:
  label: Browse
  title: Browse
  description: Generated navigation aids, discovery indexes, and the canonical glossary.
  position: 5

managed_markers:
  markdown_start: "<!-- generated:content:start -->"
  markdown_end: "<!-- generated:content:end -->"
  epic_progress_start: "<!-- managed:epic-progress:start -->"
  epic_progress_end: "<!-- managed:epic-progress:end -->"

indexes:
  labs:
    title: Labs Index
    description: Metadata-driven index of hands-on labs.
    slug: /indexes/labs
  journal:
    title: Journal Index
    description: Metadata-driven index of dated engineering journal entries.
    slug: /indexes/journal
  case-studies:
    title: Case Studies Index
    description: Metadata-driven index of case studies and analysis write-ups.
    slug: /indexes/case-studies
  governance:
    title: Governance Index
    description: Metadata-driven index of governance and repository policy docs.
    slug: /indexes/governance
