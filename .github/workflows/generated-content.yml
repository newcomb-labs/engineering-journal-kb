---
name: generated-content

"on":
  pull_request:
    paths:
      - "website/docs/**"
      - ".github/governance/**"
      - "scripts/generate_content_artifacts.py"
      - "scripts/validate_generated_content.py"
      - ".github/workflows/generated-content.yml"
      - "website/sidebars.js"
      - ".pre-commit-config.yaml"
  push:
    branches:
      - main
    paths:
      - "website/docs/**"
      - ".github/governance/**"
      - "scripts/generate_content_artifacts.py"
      - "scripts/validate_generated_content.py"
      - ".github/workflows/generated-content.yml"
      - "website/sidebars.js"
      - ".pre-commit-config.yaml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: generated-content-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-generated-content:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install generator dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml

      - name: Validate generated artifacts are current
        run: python3 scripts/validate_generated_content.py
