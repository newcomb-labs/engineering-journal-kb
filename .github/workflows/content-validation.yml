---
name: content-validation

"on":
  pull_request:
    paths:
      - "docs/governance/**"
      - "website/docs/**"
      - ".github/governance/content-rules.yml"
      - "scripts/_content_validation.py"
      - "scripts/validate_frontmatter.py"
      - "scripts/validate_lifecycle.py"
      - "scripts/validate_taxonomy.py"
      - "scripts/validate_location.py"
      - "scripts/validate_all.py"
      - ".pre-commit-config.yaml"
      - ".github/workflows/content-validation.yml"
  push:
    branches:
      - main
    paths:
      - "docs/governance/**"
      - "website/docs/**"
      - ".github/governance/content-rules.yml"
      - "scripts/_content_validation.py"
      - "scripts/validate_frontmatter.py"
      - "scripts/validate_lifecycle.py"
      - "scripts/validate_taxonomy.py"
      - "scripts/validate_location.py"
      - "scripts/validate_all.py"
      - ".pre-commit-config.yaml"
      - ".github/workflows/content-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  content-validation:
    name: Validate governed content
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install validation dependencies
        run: python -m pip install --upgrade pip pyyaml

      - name: Run drift guard
        run: python3 scripts/check_no_mkdocs.py

      - name: Run content validators
        run: python3 scripts/validate_all.py
