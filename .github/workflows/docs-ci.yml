---
name: Docs CI

"on":
  push:
    branches-ignore:
      - main
  pull_request:

jobs:
  docs-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Build documentation site
        working-directory: website
        run: npm run build

      - name: Write workflow summary
        if: always()
        run: |
          {
            echo "## 📚 Docs CI Summary"
            echo ""
            echo "| Check | Status | Notes |"
            echo "|---|---|---|"
            echo "| MkDocs build | ✅ Completed | Documentation build finished |"
          } >> "$GITHUB_STEP_SUMMARY"
