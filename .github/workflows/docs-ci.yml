name: Docs CI

on:
  push:
    branches-ignore:
      - main
  pull_request:

jobs:
  docs-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements-docs.txt

      - name: Build documentation
        run: |
          mkdocs build --strict

      - name: Install Python deps
        run: pip install pyyaml

      - name: Sync labels
        run: python scripts/sync_labels.py --repo ${{ github.repository }}
