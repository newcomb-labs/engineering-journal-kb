---
name: docs-ci

"on":
  pull_request:
    paths:
      - "docs/**"
      - "website/**"
      - ".github/workflows/docs-ci.yml"
      - ".github/workflows/link-check.yml"
      - ".github/workflows/spell-check.yml"
      - ".pre-commit-config.yaml"
      - "scripts/check_no_mkdocs.py"
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "website/**"
      - ".github/workflows/docs-ci.yml"
      - ".github/workflows/link-check.yml"
      - ".github/workflows/spell-check.yml"
      - ".pre-commit-config.yaml"
      - "scripts/check_no_mkdocs.py"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Fail on legacy docs drift
        run: python3 scripts/check_no_mkdocs.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Lint Markdown
        run: npx --yes markdownlint-cli@0.41.0 "**/*.md" --ignore node_modules --ignore website/build --ignore website/.docusaurus

      - name: Install website dependencies
        working-directory: website
        run: npm ci

      - name: Build Docusaurus site
        working-directory: website
        env:
          CI: "true"
        run: npm run build

      - name: Upload built site artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: docusaurus-site
          path: website/build
          if-no-files-found: error
