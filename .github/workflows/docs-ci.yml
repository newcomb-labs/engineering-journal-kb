---
name: docs-ci

"on":
  pull_request:
    paths:
      - "docs/**"
      - "website/**"
      - ".github/governance/**"
      - ".github/workflows/docs-ci.yml"
      - ".github/workflows/generated-content.yml"
      - ".github/workflows/link-check.yml"
      - ".github/workflows/spell-check.yml"
      - ".pre-commit-config.yaml"
      - "scripts/check_no_mkdocs.py"
      - "scripts/validate_content.py"
      - "scripts/validate_required_headings.py"
      - "scripts/apply_frontmatter_defaults.py"
      - "scripts/apply_required_headings.py"
      - "scripts/generate_content_artifacts.py"
      - "scripts/validate_generated_content.py"
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "website/**"
      - ".github/governance/**"
      - ".github/workflows/docs-ci.yml"
      - ".github/workflows/generated-content.yml"
      - ".github/workflows/link-check.yml"
      - ".github/workflows/spell-check.yml"
      - ".pre-commit-config.yaml"
      - "scripts/check_no_mkdocs.py"
      - "scripts/validate_content.py"
      - "scripts/validate_required_headings.py"
      - "scripts/apply_frontmatter_defaults.py"
      - "scripts/apply_required_headings.py"
      - "scripts/generate_content_artifacts.py"
      - "scripts/validate_generated_content.py"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install governance validator dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml

      - name: Fail on legacy docs drift
        run: python3 scripts/check_no_mkdocs.py

      - name: Validate content governance
        shell: bash
        run: |
          set -euo pipefail
          find website/docs/labs \
               website/docs/case-studies \
               website/docs/governance \
               website/docs/engineering \
               website/docs/operations \
               -type f \( -name '*.md' -o -name '*.mdx' \) -print0 \
            | xargs -0 python3 scripts/validate_content.py

      - name: Validate required headings
        run: python3 scripts/validate_required_headings.py

      - name: Validate generated content freshness
        run: python3 scripts/validate_generated_content.py

      # -----------------------------
      # Node setup (root)
      # -----------------------------
      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm

      - name: Install root deps
        run: npm ci

      # -----------------------------
      # Markdown lint
      # -----------------------------
      - name: Lint Markdown
        run: |
          npx markdownlint-cli "**/*.md" \
            --ignore node_modules \
            --ignore website/build \
            --ignore website/.docusaurus

      # -----------------------------
      # Detect changed files
      # -----------------------------
      - name: Get changed files
        id: changed
        uses: tj-actions/changed-files@v46

      # -----------------------------
      # ESLint (changed only)
      # -----------------------------
      - name: ESLint (changed files)
        if: steps.changed.outputs.any_changed == 'true'
        run: |
          FILES="${{ steps.changed.outputs.all_changed_files }}"
          JS=$(echo "$FILES" | tr ' ' '\n' | grep -E '^website/src/.*\.(js|mjs|cjs|jsx)$' || true)
          if [ -n "$JS" ]; then
            echo "$JS" | xargs npx eslint
          fi

      # -----------------------------
      # Stylelint (changed only)
      # -----------------------------
      - name: Stylelint (changed files)
        if: steps.changed.outputs.any_changed == 'true'
        run: |
          FILES="${{ steps.changed.outputs.all_changed_files }}"
          CSS=$(echo "$FILES" | tr ' ' '\n' | grep -E '^website/src/.*\.(css|scss)$' || true)
          if [ -n "$CSS" ]; then
            echo "$CSS" | xargs npx stylelint
          fi

      # -----------------------------
      # Prettier (changed only)
      # -----------------------------
      - name: Prettier check (changed files)
        if: steps.changed.outputs.any_changed == 'true'
        run: |
          FILES="${{ steps.changed.outputs.all_changed_files }}"
          FORMAT=$(echo "$FILES" | tr ' ' '\n' | grep -E '\.(js|mjs|cjs|jsx|css|scss|json|md|ya?ml)$' || true)
          if [ -n "$FORMAT" ]; then
            echo "$FORMAT" | xargs npx prettier --check
          fi

      # -----------------------------
      # FULL lint on main only
      # -----------------------------
      - name: Full lint (main only)
        if: github.ref == 'refs/heads/main'
        run: npm run lint

      # -----------------------------
      # Build site (always after validation)
      # -----------------------------
      - name: Install website deps
        working-directory: website
        run: npm ci

      - name: Build Docusaurus
        working-directory: website
        env:
          CI: "true"
        run: npm run build

      - name: Upload artifact (PR only)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: docusaurus-site
          path: website/build
