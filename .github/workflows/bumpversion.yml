---
name: Release Version

"on":
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bump-version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Commitizen
        run: pip install commitizen

      - name: Bump version
        run: |
          cz bump --yes --changelog
          VERSION=$(cz version -p)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Create release branch
        run: |
          git checkout -b release/v${VERSION}

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore(release): v${VERSION}"

      - name: Push branch
        run: |
          git push origin release/v${VERSION}

      - name: Create Pull Request
        uses: gh-actions/create-pull-request@v6
        with:
          title: "chore(release): v${{ env.VERSION }}"
          body: |
            Automated version bump and changelog update.

            ## Release
            Version: `${{ env.VERSION }}`

            This PR was generated automatically by the release workflow.
          base: main
          head: release/v${{ env.VERSION }}
