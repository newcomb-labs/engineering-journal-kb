---
name: Release PR

"on":
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Commitizen
        run: pip install commitizen

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          cz bump --yes --changelog
          VERSION=$(cz version -p)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Create release branch
        run: |
          git checkout -b release/v${VERSION}

      - name: Commit changes
        run: |
          git add .
          git commit -m "chore(release): v${VERSION}"

      - name: Push release branch
        run: |
          git push origin release/v${VERSION}

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: release/v${{ env.VERSION }}
          title: "chore(release): v${{ env.VERSION }}"
          body: |
            Automated release PR.

            Version: `${{ env.VERSION }}`

            This PR updates the version and changelog generated by Commitizen.

            After merge, the release tag workflow will create the Git tag.
          base: main

      - name: Write workflow summary
        if: always()
        run: |
          {
            echo "## 🚀 Release PR Summary"
            echo ""
            echo "| Step | Status |"
            echo "|---|---|"
            echo "| Version bump | ✅ Completed |"
            echo "| Release branch | release/v${VERSION} |"
            echo "| Pull request | Created |"
          } >> "$GITHUB_STEP_SUMMARY"
