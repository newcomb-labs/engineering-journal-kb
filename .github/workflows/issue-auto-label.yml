---
name: Issue Auto Label

"on":
  issues:
    types: [opened, edited]
  pull_request:
    types: [opened, edited]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  auto-label:
    runs-on: ubuntu-latest
    steps:
      - name: Auto label and assign
        uses: Naturalclar/issue-action@v2.0.2
        with:
          title-or-body: both
          parameters: >-
            [
              {
                "keywords": ["bug", "error", "failure", "broken", "hotfix"],
                "labels": ["type:fix"],
                "assignees": []
              },
              {
                "keywords": ["docs", "documentation", "readme", "instruction"],
                "labels": ["type:docs"],
                "assignees": []
              },
              {
                "keywords": ["workflow", "action", "ci", "lint", "automation", "pipeline"],
                "labels": ["area:ci"],
                "assignees": []
              },
              {
                "keywords": ["security", "secret", "credential", "token", "hardening", "leak", "audit"],
                "labels": ["area:security"],
                "assignees": []
              },
              {
                "keywords": ["feature", "enhancement", "addition", "new"],
                "labels": ["type:feature"],
                "assignees": []
              },
              {
                "keywords": ["chore", "cleanup", "housekeeping", "maintenance", "deps", "update"],
                "labels": ["type:chore"],
                "assignees": []
              },
              {
                "keywords": ["repo", "governance", "template", "label", "standards", "policy"],
                "labels": ["area:repo"],
                "assignees": []
              },
              {
                "keywords": ["ansible", "docker", "compose", "homelab", "server", "provisioning", "infra"],
                "labels": ["area:infrastructure"],
                "assignees": []
              },
              {
                "keywords": ["pi", "orange pi", "raspberry pi", "sbc", "hardware", "board"],
                "labels": ["area:hardware"],
                "assignees": []
              },
              {
                "keywords": ["research", "explore", "spike", "investigation", "learning"],
                "labels": ["type:research"],
                "assignees": []
              }
            ]
          github-token: ${{ secrets.GITHUB_TOKEN }}
