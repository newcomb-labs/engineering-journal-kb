---
name: chatgpt-review

"on":
  issue_comment:
    types:
      - created

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: chatgpt-review-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  review:
    name: Review pull request with ChatGPT
    runs-on: ubuntu-latest
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, 'chatgpt')

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run ChatGPT review
        id: review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          GITHUB_STEP_SUMMARY: ${{ env.GITHUB_STEP_SUMMARY }}
        run: python scripts/chatgpt_review.py

      - name: Upload review artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chatgpt-review-pr-${{ github.event.issue.number }}
          path: .github/chatgpt-review-output.md
          if-no-files-found: error
