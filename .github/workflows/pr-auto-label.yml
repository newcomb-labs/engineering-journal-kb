---
name: pr-auto-label

"on":
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    name: Apply path-based labels
    runs-on: ubuntu-latest

    steps:
      - name: Apply labels from changed paths
        uses: actions/labeler@v5
