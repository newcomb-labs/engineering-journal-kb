---
name: PR Auto Label

"on":
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Apply labels
        uses: actions/labeler@v6
        with:
          configuration-path: .github/labeler.yml
