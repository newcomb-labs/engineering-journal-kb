---
name: link-check

on:
  pull_request:
    paths:
      - "website/docs/**"
      - "docs/**"
      - "*.md"
  push:
    branches:
      - main
    paths:
      - "website/docs/**"
      - "docs/**"
      - "*.md"
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: link-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  link-check:
    name: Check links
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install lychee
        env:
          LYCHEE_VERSION: "0.23.0"
        run: |
          curl -sSfL \
            "https://github.com/lycheeverse/lychee/releases/download/lychee-v${LYCHEE_VERSION}/lychee-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C /usr/local/bin lychee
          lychee --version

      - name: Run link checker
        run: |
          lychee \
            --config .lychee.toml \
            --exclude-path website/build \
            --exclude-path website/.docusaurus \
            --exclude-path website/node_modules \
            --exclude-path node_modules \
            "website/docs/**/*.md" \
            "docs/**/*.md" \
            "*.md"
